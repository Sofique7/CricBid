<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="100" viewBox="0 0 480 100" fill="none"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Clip for upper oval counter in B -->
    <clipPath id="ubClip">
      <ellipse cx="188.56" cy="32.75" rx="11.88" ry="11.25"/>
    </clipPath>
    <!-- Clip for lower oval counter in B -->
    <clipPath id="lbClip">
      <ellipse cx="191.50" cy="68.75" rx="15.12" ry="10.35"/>
    </clipPath>
    <!-- Clip for d oval counter -->
    <clipPath id="dcClip">
      <ellipse cx="248.99" cy="68.00" rx="17.52" ry="10.80"/>
    </clipPath>
  </defs>

  <!-- ── "Cric" text ── -->
  <text x="0" y="86" 
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2"
        fill="#7A7A7A">Cric</text>

  <!-- ── Cricket Ball icon ── -->
  <!-- Top half: green -->
  <path d="M 136.0 50.0 A 20.0 20.0 0 0 1 176.0 50.0 Z"
        fill="#C8D9A0" opacity="0.90"/>
  <!-- Bottom half: blue -->
  <path d="M 136.0 50.0 A 20.0 20.0 0 0 0 176.0 50.0 Z"
        fill="#6FB3D3" opacity="0.90"/>
  <!-- Ball seam lines -->
  <path d="M 142.0 44.0 Q 156.0 32.0 170.0 44.0"
        stroke="white" stroke-width="1.4" fill="none" opacity="0.80"/>
  <path d="M 142.0 56.0 Q 156.0 68.0 170.0 56.0"
        stroke="white" stroke-width="1.4" fill="none" opacity="0.80"/>
  <!-- Ball divider line -->
  <line x1="136.0" y1="50.0" x2="176.0" y2="50.0"
        stroke="white" stroke-width="1.2" opacity="0.60"/>

  <!-- ── Letter B ── -->
  <!-- B outer shape (using even-odd fill rule so counters punch through) -->
  <path d="M 167.00 14.00 L 178.00 14.00 Q 184.60 14.00 193.40 22.44 Q 200.00 29.00 200.00 32.75 Q 200.00 36.50 193.40 43.06 Q 184.60 51.50 178.00 51.50 Q 186.10 51.50 198.25 59.26 Q 205.00 65.30 205.00 68.75 Q 205.00 72.20 198.25 78.24 Q 186.10 86.00 178.00 86.00 L 167.00 86.00 Z M 200.44 32.75 A 11.88 11.25 0 0 1 176.68 32.75 A 11.88 11.25 0 0 1 200.44 32.75 Z M 206.62 68.75 A 15.12 10.35 0 0 1 176.38 68.75 A 15.12 10.35 0 0 1 206.62 68.75 Z"
        fill="#7A7A7A" fill-rule="evenodd"/>

  <!-- Seam decoration inside upper oval -->
  <g clip-path="url(#ubClip)">
    <path d="M 179.65 31.06 Q 188.56 33.54 197.47 31.06"
          stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.55"/>
    <path d="M 179.65 34.44 Q 188.56 31.96 197.47 34.44"
          stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.55"/>
  </g>
  <!-- Seam decoration inside lower oval -->
  <g clip-path="url(#lbClip)">
    <path d="M 180.16 67.20 Q 191.50 69.47 202.84 67.20"
          stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.55"/>
    <path d="M 180.16 70.30 Q 191.50 68.03 202.84 70.30"
          stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.55"/>
  </g>

  <!-- ── Letter i ── -->
  <text x="221.0" y="86"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2"
        fill="#7A7A7A">i</text>

  <!-- ── Letter d ── -->
  <path d="M 264.00 10.00 L 275.00 10.00 L 275.00 86.00 L 264.00 86.00 Q 254.62 86.00 240.54 77.90 Q 232.72 71.60 232.72 68.00 Q 232.72 64.40 240.54 58.10 Q 254.62 50.00 264.00 50.00 Z M 266.50 68.00 A 17.52 10.80 0 0 1 231.47 68.00 A 17.52 10.80 0 0 1 266.50 68.00 Z"
        fill="#7A7A7A" fill-rule="evenodd"/>

  <!-- Seam decoration inside d oval -->
  <g clip-path="url(#dcClip)">
    <path d="M 235.85 66.38 Q 248.99 68.76 262.12 66.38"
          stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.55"/>
    <path d="M 235.85 69.62 Q 248.99 67.24 262.12 69.62"
          stroke="#FFFFFF" stroke-width="1.1" fill="none" opacity="0.55"/>
  </g>

</svg>